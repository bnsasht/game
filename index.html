<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EyeQ</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- HOME -->
<div id="screen-home" class="screen active">

  <div id="cursor"></div>
  <div id="cursor-trail"></div>
  <canvas id="bg-canvas"></canvas>

  <div id="home-inner">
    <div class="eye-wrap">
      <svg class="eye-svg" viewBox="0 0 100 60" fill="none">
        <ellipse cx="50" cy="30" rx="48" ry="28" stroke="#ff3c5f" stroke-width="2" opacity="0.3"/>
        <path d="M2 30 C20 4, 80 4, 98 30 C80 56, 20 56, 2 30Z" fill="none" stroke="#ff3c5f" stroke-width="1.5" opacity="0.6"/>
        <path d="M8 30 C22 10, 78 10, 92 30 C78 50, 22 50, 8 30Z" fill="rgba(255,60,95,0.06)"/>
        <circle class="iris" cx="50" cy="30" r="14" fill="rgba(255,60,95,0.15)" stroke="#ff3c5f" stroke-width="1.5"/>
        <circle cx="50" cy="30" r="7" fill="#ff3c5f" opacity="0.9"/>
        <circle cx="54" cy="26" r="2.5" fill="white" opacity="0.7"/>
        <line x1="30" y1="12" x2="28" y2="4" stroke="#ff3c5f" stroke-width="1" opacity="0.4"/>
        <line x1="42" y1="8" x2="41" y2="0" stroke="#ff3c5f" stroke-width="1" opacity="0.4"/>
        <line x1="54" y1="8" x2="54" y2="0" stroke="#ff3c5f" stroke-width="1" opacity="0.4"/>
        <line x1="66" y1="10" x2="67" y2="2" stroke="#ff3c5f" stroke-width="1" opacity="0.4"/>
      </svg>
    </div>
    <div class="logo-wrap">
      <span class="logo-text">Eye</span>
      <span class="logo-q">Q</span>
    </div>
    <p class="tagline">Spot · Find · Conquer</p>
    <div class="coin-badge"><span>🪙</span><span id="home-coins">0</span> coins</div>
    <div class="btn-group">
      <button class="btn-play" onclick="playClick(); showScreen('screen-worlds')">PLAY</button>
      <button class="btn-shop" onclick="playClick(); openShop()">🪙 Buy Coins</button>
    </div>
  </div>

  <div class="world-teaser">
    <div class="world-chip">🏙 Kathmandu</div>
    <div class="world-chip">🎭 Festivals</div>
    <div class="world-chip">🏔 Himalaya</div>
    <div class="world-chip">✊ Gen Z</div>
  </div>
  <p class="version">v1.0 · BETA</p>

</div>

  <!-- WORLD SELECT -->
  <div id="screen-worlds" class="screen">
    <div class="screen-header">
      <button class="btn-back" onclick="showScreen('screen-home')">← Back</button>
      <h2>Choose a World</h2>
      <div class="coin-bar"><span>🪙</span><span id="worlds-coins">0</span></div>
    </div>
    <div id="worlds-grid"></div>
  </div>

  <!-- LEVEL SELECT -->
  <div id="screen-levels" class="screen">
    <div class="screen-header">
      <button class="btn-back" onclick="showScreen('screen-worlds')">← Back</button>
      <h2 id="level-select-title"></h2>
      <div class="coin-bar"><span>🪙</span><span id="levels-coins">0</span></div>
    </div>
    <div id="levels-grid"></div>
  </div>

  <!-- GAME -->
  <div id="screen-game" class="screen">
    <div id="hud">
      <span id="hud-level">Level 1</span>
      <span id="hud-timer">⏱ 60s</span>
      <span id="hud-coins">🪙 0</span>
    </div>
    <div id="powerups">
      <button onclick="useHint()">💡 Hint <small>(40🪙)</small></button>
      <button onclick="useFreeze()">❄️ Freeze <small>(100🪙)</small></button>
      <button onclick="useSkip()">⏭ Skip <small>(500🪙)</small></button>
      <button onclick="openShop()">+ Coins</button>
      <button onclick="quitLevel()">🚪 Quit</button>
    </div>
    <div id="image-area">
      <div class="img-wrap">
        <img id="img-left" src="" alt="Original" />
        <div id="markers-left" class="markers"></div>
      </div>
      <div class="img-wrap">
        <img id="img-right" src="" alt="Find differences" />
        <div id="markers-right" class="markers"></div>
      </div>
    </div>
    <p id="found-label">Found: 0 / 0</p>
  </div>

  <!-- LEVEL WIN -->
  <div id="screen-win" class="screen">
    <div class="result-box">
      <h2>🎉 Level Complete!</h2>
      <p id="win-msg"></p>
      <button class="btn-primary" onclick="nextLevel()">Next Level →</button>
      <button class="btn-secondary" onclick="showScreen('screen-worlds')">World Map</button>
    </div>
  </div>

  <!-- GAME OVER -->
  <div id="screen-lose" class="screen">
    <div class="result-box">
      <h2>⏰ Time's Up!</h2>
      <p>Better luck next time</p>
      <button class="btn-primary" onclick="retryLevel()">Try Again</button>
      <button class="btn-secondary" onclick="showScreen('screen-worlds')">World Map</button>
    </div>
  </div>

  <!-- SHOP OVERLAY -->
  <div id="shop-overlay" class="overlay hidden">
    <div class="overlay-box">
      <h2>🪙 Buy Coins</h2>
      <div class="shop-options">
        <div class="shop-item" onclick="buyCoin(100, '0.99')">
          <span class="shop-amount">100</span>
          <span class="shop-label">coins</span>
          <span class="shop-price">$0.99</span>
        </div>
        <div class="shop-item featured" onclick="buyCoin(500, '3.99')">
          <span class="shop-badge">Best Value</span>
          <span class="shop-amount">500</span>
          <span class="shop-label">coins</span>
          <span class="shop-price">$3.99</span>
        </div>
        <div class="shop-item" onclick="buyCoin(1200, '7.99')">
          <span class="shop-amount">1200</span>
          <span class="shop-label">coins</span>
          <span class="shop-price">$7.99</span>
        </div>
      </div>
      <button class="btn-secondary" onclick="closeShop()">Close</button>
    </div>
  </div>

  <!-- UNLOCK OVERLAY -->
  <div id="unlock-overlay" class="overlay hidden">
    <div class="overlay-box">
      <h2 id="unlock-title"></h2>
      <p id="unlock-desc"></p>
      <div class="unlock-options">
        <button class="btn-primary" id="unlock-coins-btn" onclick="unlockWithCoins()"></button>
        <button class="btn-gold" id="unlock-money-btn" onclick="unlockWithMoney()"></button>
      </div>
      <button class="btn-secondary" onclick="closeUnlock()">Cancel</button>
    </div>
  </div>

  <script src="themes/kathmandu.js"></script>
  <script src="themes/festivals.js"></script>
  <script src="themes/himalaya.js"></script>
  <script src="themes/genz.js"></script>
  <script src="script.js"></script>
</body>
</html>
